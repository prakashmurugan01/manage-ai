services:
  redis:
    image: redis:7-alpine
    container_name: manageai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: manageai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      DB_NAME: data/manageai.sqlite3
      REDIS_URL: redis://redis:6379/0
      USE_INMEMORY_CHANNELS: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
      - media:/app/media

  frontend:
    build:
      context: ./frontend
    container_name: manageai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  sqlite_data:
  redis_data:
  media:
